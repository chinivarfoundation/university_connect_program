title: Chinivar Foundation Documentation
description: >-
  Technical and product documentation for the Chinivar Foundation digital platform, 
  focused on breaking the cycle of generational poverty through education and food security.
baseurl: ""
url: "https://chinivarfoundation.org"

# Build settings
theme: minima
source: docs
destination: _site

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-relative-links

# Relative Links Configuration
relative_links:
  enabled: true
  collections: true

# Metadata
author: Chinivar Foundation
email: belaku@chinivarfoundation.org
twitter_username: chinivar_fdn # placeholder
github_username: chinivarfoundation # placeholder

# Exclude from processing
exclude:
  - .git
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
